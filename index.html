<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
 <title>Machine Learning Poster</title>
 <style>
 *{
 box-sizing:border-box;
 margin:0;
 padding:0;
 }

 html, body{
 width:100%;
 overflow-x:hidden;
 }

 :root{
 --bg1:#4e0445;
 --bg2:#f7d18e;
 --bg3:#65eaf6;
 --cyan:#86f6ff;
 --teal:#85ffd8;
 --violet:#b895ff;
 --pink:#f19bff;
 --white:#ffffff;
 --softWhite:rgba(255,255,255,.82);
 --glass:rgba(255,255,255,.08);
 --glass2:rgba(255,255,255,.12);
 --border:rgba(255,255,255,.14);
 --shadow:0 18px 40px rgba(0,0,0,.45);
 }

 body{
 min-height:100vh;
 min-height:100svh;
 min-height:100dvh;
 display:flex;
 justify-content:center;
 align-items:center;
 padding:18px;
 font-family:Arial, Helvetica, sans-serif;
 background:
 radial-gradient(circle at 10% 92%, rgba(176,89,255,.22), transparent 22%),
 radial-gradient(circle at 88% 20%, rgba(77,255,232,.12), transparent 24%),
 linear-gradient(135deg,#8cda89,#06102a 45%, #92cc91);
 color:#fff;
 }

 .poster{
 position:relative;
 width:min(100%, 1080px);
 aspect-ratio:1080 / 1350;
 min-height:calc(100vh - 36px);
 min-height:calc(100svh - 36px);
 min-height:calc(100dvh - 36px);
 overflow:hidden;
 border-radius:0;
 background:
 radial-gradient(circle at 10% 88%, rgba(191,102,255,.22), transparent 22%),
 radial-gradient(circle at 90% 82%, rgba(66,255,239,.12), transparent 24%),
 radial-gradient(circle at 84% 12%, rgba(236, 31, 181, 0.1), transparent 18%),
 linear-gradient(90deg,#775208 0%, #e3ddaa 42%, #dcf2b5 72%, #3b9dde 100%);
 box-shadow:0 30px 70px rgba(0,0,0,.45);
 }

 .poster::before{
 content:"";
 position:absolute;
 inset:0;
 background:
 linear-gradient(180deg, rgba(255,255,255,.02), transparent 20%, transparent 80%, rgba(255,255,255,.02));
 pointer-events:none;
 }

 .grid-dots{
 position:absolute;
 width:62px;
 height:62px;
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:7px;
 opacity:.7;
 }

 .grid-dots span{
 width:7px;
 height:7px;
 border-radius:50%;
 background:rgba(255,255,255,.72);
 box-shadow:0 0 10px rgba(135,246,255,.25);
 }

 .dots-tl{ left:62px; top:58px; }
 .dots-bl{ left:64px; bottom:58px; }

 .top-right{
 position:absolute;
 top:54px;
 right:56px;
 text-align:right;
 color:rgba(225,240,255,.7);
 z-index:4;
 }

 .top-right .mini{
 display:flex;
 justify-content:flex-end;
 gap:9px;
 margin-bottom:12px;
 }

 .top-right .mini span{
 width:11px;
 height:11px;
 border-radius:50%;
 background:rgba(200,255,252,.85);
 box-shadow:0 0 12px rgba(135,246,255,.35);
 }

 .top-right .size{
 font-size:18px;
 font-weight:500;
 letter-spacing:.3px;
 }

 .content{
 position:relative;
 z-index:3;
 width:100%;
 height:100%;
 padding:120px 82px 74px;
 }

 .title{
 text-align:center;
 line-height:1.02;
 letter-spacing:-1.7px;
 position:relative;
 }

 .title::after{
 content:"";
 position:absolute;
 left:50%;
 top:50%;
 transform:translate(-50%,-50%);
 width:70%;
 height:120px;
 background:radial-gradient(circle, rgba(132,235,255,.12), transparent 70%);
 filter:blur(30px);
 z-index:-1;
 pointer-events:none;
 }

 .title .top,
 .title .mid,
 .title .bottom{
 display:block;
 font-weight:800;
 position:relative;
 animation:titleFloat 4s ease-in-out infinite;
 }

 .title .top{
 font-size:78px;
 color:#ffffff;
 text-shadow:
 0 0 8px rgba(255,255,255,.35),
 0 0 16px rgba(255,255,255,.18),
 0 0 28px rgba(132,235,255,.12);
 }

 .title .mid,
 .title .bottom{
 font-size:86px;
 background:linear-gradient(
 90deg,
 #f4b7ff 0%,
 #caa7ff 20%,
 #97d7ff 45%,
 #84ebff 68%,
 #84ffd7 100%
 );
 background-size:200% auto;
 -webkit-background-clip:text;
 background-clip:text;
 color:transparent;
 animation:
 gradientShift 5s linear infinite,
 glowPulse 2.8s ease-in-out infinite,
 titleFloat 4s ease-in-out infinite;
 filter:drop-shadow(0 0 8px rgba(132,235,255,.18));
 }

 .title .mid{
 animation-delay:0s, 0s, 0s;
 }

 .title .bottom{
 animation-delay:0s, 1s, .4s;
 }

 .subtitle{
 text-align:center;
 margin-top:24px;
 font-size:32px;
 color:rgba(232,242,255,.82);
 font-weight:400;
 }

 .middle{
 position:relative;
 height:560px;
 margin-top:40px;
 }

 .num{
 position:absolute;
 font-weight:700;
 user-select:none;
 pointer-events:none;
 opacity:.95;
 animation:float 6s ease-in-out infinite;
 }

 .num.pink{ color:#ff9ac9; text-shadow:0 0 18px rgba(255,154,201,.18); }
 .num.cyan{ color:#8ef2ff; text-shadow:0 0 18px rgba(142,242,255,.18); }
 .num.white{ color:rgba(255,255,255,.8); }

 @keyframes float{
 0%,100%{ transform:translateY(0px); }
 50%{ transform:translateY(-10px); }
 }

 @keyframes gradientShift{
 0%{ background-position:0% center; }
 100%{ background-position:200% center; }
 }

 @keyframes glowPulse{
 0%,100%{
 text-shadow:
 0 0 10px rgba(244,183,255,.22),
 0 0 20px rgba(183,147,255,.18),
 0 0 30px rgba(132,235,255,.20),
 0 0 42px rgba(132,255,215,.18);
 filter:drop-shadow(0 0 8px rgba(132,235,255,.16));
 }
 50%{
 text-shadow:
 0 0 14px rgba(244,183,255,.36),
 0 0 28px rgba(183,147,255,.30),
 0 0 42px rgba(132,235,255,.34),
 0 0 60px rgba(132,255,215,.28);
 filter:drop-shadow(0 0 14px rgba(132,255,215,.24));
 }
 }

 @keyframes titleFloat{
 0%,100%{ transform:translateY(0px); }
 50%{ transform:translateY(-3px); }
 }

 .glass{
 position:absolute;
 background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
 border:1px solid rgba(255,255,255,.12);
 border-radius:18px;
 backdrop-filter:blur(8px);
 -webkit-backdrop-filter:blur(8px);
 box-shadow:var(--shadow);
 overflow:hidden;
 }

 .glass::before{
 content:"";
 position:absolute;
 inset:0;
 background:linear-gradient(135deg, rgba(255,255,255,.08), transparent 50%, rgba(135,246,255,.05));
 pointer-events:none;
 }

 .chart-line{
 padding:12px;
 }

 .chart-line svg{
 width:100%;
 height:100%;
 display:block;
 }

 .code-card{
 padding:14px 12px;
 color:rgba(215,231,255,.78);
 font-size:11px;
 line-height:1.45;
 font-family:Consolas, monospace;
 }

 .mini-panel{
 padding:12px;
 display:flex;
 flex-direction:column;
 gap:9px;
 }

 .mini-panel .bar{
 height:8px;
 border-radius:999px;
 background:rgba(255,255,255,.12);
 }

 .mini-panel .row{
 display:flex;
 align-items:center;
 gap:8px;
 }

 .mini-panel .dot{
 width:7px;
 height:7px;
 border-radius:50%;
 background:#8ffcff;
 box-shadow:0 0 10px rgba(143,252,255,.35);
 }

 .ai-card{
 position:absolute;
 right:18px;
 bottom:48px;
 width:360px;
 height:255px;
 border-radius:28px;
 background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.04));
 border:1px solid rgba(255,255,255,.12);
 backdrop-filter:blur(8px);
 -webkit-backdrop-filter:blur(8px);
 box-shadow:0 24px 55px rgba(0,0,0,.38);
 overflow:hidden;
 }

 .chip{
 position:absolute;
 bottom:28px;
 left:50%;
 transform:translateX(-50%);
 width:145px;
 height:108px;
 border-radius:20px;
 background:
 radial-gradient(circle at 50% 18%, rgba(154,255,245,.28), transparent 38%),
 linear-gradient(180deg, rgba(124,247,255,.16), rgba(190,133,255,.14)),
 rgba(7,17,43,.96);
 border:1px solid rgba(127,247,255,.22);
 box-shadow:
 0 0 35px rgba(124,247,255,.16),
 inset 0 0 25px rgba(255,255,255,.04);
 display:flex;
 align-items:center;
 justify-content:center;
 }

 .chip::before{
 content:"";
 position:absolute;
 inset:-10px;
 border-radius:26px;
 border:2px solid rgba(124,247,255,.06);
 }

 .chip .ai{
 font-size:42px;
 font-weight:800;
 background:linear-gradient(90deg,#c39cff,#81eeff,#84ffd7);
 -webkit-background-clip:text;
 background-clip:text;
 color:transparent;
 }

 .brain{
 position:absolute;
 left:50%;
 top:28px;
 transform:translateX(-50%);
 width:120px;
 height:90px;
 border:2px solid rgba(135,255,236,.45);
 border-radius:55% 55% 48% 48%;
 box-shadow:0 0 20px rgba(135,255,236,.12);
 opacity:.95;
 }

 .brain::before,
 .brain::after{
 content:"";
 position:absolute;
 top:18px;
 width:34px;
 height:42px;
 border:2px solid rgba(135,255,236,.38);
 border-radius:50%;
 }

 .brain::before{
 left:20px;
 border-right:none;
 border-bottom:none;
 transform:rotate(-14deg);
 }

 .brain::after{
 right:20px;
 border-left:none;
 border-bottom:none;
 transform:rotate(14deg);
 }

 .chart-right{
 position:absolute;
 right:170px;
 top:148px;
 width:210px;
 height:145px;
 }

 .small-card{
 position:absolute;
 width:92px;
 height:92px;
 }

 .small-bars{
 display:flex;
 align-items:flex-end;
 justify-content:center;
 gap:7px;
 height:100%;
 padding:18px 12px;
 }

 .small-bars span{
 width:10px;
 border-radius:10px 10px 3px 3px;
 background:linear-gradient(180deg,#d899ff,#82f2ff);
 box-shadow:0 0 10px rgba(130,242,255,.18);
 }

 .small-bars span:nth-child(1){ height:28px; }
 .small-bars span:nth-child(2){ height:42px; }
 .small-bars span:nth-child(3){ height:52px; }
 .small-bars span:nth-child(4){ height:36px; }

 .wave-wrap{
 position:absolute;
 left:50%;
 top:50%;
 transform:translate(-50%,-8%);
 width:960px;
 height:220px;
 z-index:3;
 pointer-events:none;
 filter:drop-shadow(0 0 18px rgba(122,237,255,.22));
 }

 .author{
 position:absolute;
 left:50%;
 bottom:78px;
 transform:translateX(-50%);
 font-size:22px;
 font-weight:700;
 letter-spacing:.8px;
 color:rgba(255,255,255,.84);
 z-index:5;
 }

 .features{
 position:absolute;
 left:50%;
 bottom:88px;
 transform:translateX(-50%);
 width:760px;
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:18px 22px;
 z-index:5;
 }

 .feature{
 min-height:94px;
 border-radius:20px;
 border:1px solid rgba(255,255,255,.14);
 background:linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.05));
 backdrop-filter:blur(8px);
 -webkit-backdrop-filter:blur(8px);
 box-shadow:0 18px 32px rgba(0,0,0,.28);
 color:#fff;
 font-size:28px;
 font-weight:500;
 display:flex;
 align-items:center;
 justify-content:center;
 text-align:center;
 position:relative;
 overflow:hidden;
 }

 .feature::after{
 content:"";
 position:absolute;
 left:10%;
 bottom:-28px;
 width:80%;
 height:40px;
 background:radial-gradient(circle, rgba(132,255,215,.30), transparent 60%);
 filter:blur(6px);
 }

 .mini-bottom{
 position:absolute;
 right:55px;
 bottom:42px;
 display:flex;
 align-items:flex-end;
 gap:8px;
 z-index:4;
 opacity:.7;
 }

 .mini-bottom span{
 width:6px;
 border-radius:12px;
 background:rgba(255,255,255,.75);
 }

 .mini-bottom span:nth-child(1){ height:5px; }
 .mini-bottom span:nth-child(2){ height:10px; }
 .mini-bottom span:nth-child(3){ height:14px; }
 .mini-bottom span:nth-child(4){ height:20px; }
 .mini-bottom span:nth-child(5){ height:24px; }
 .mini-bottom span:nth-child(6){ height:14px; }
 .mini-bottom span:nth-child(7){ height:8px; }

 @media (max-width: 900px){
 .content{
 padding:90px 40px 50px;
 }

 .title .top{ font-size:52px; }
 .title .mid,
 .title .bottom{ font-size:60px; }
 .subtitle{ font-size:24px; }

 .middle{
 height:430px;
 }

 .wave-wrap{
 width:700px;
 height:170px;
 }

 .ai-card{
 width:260px;
 height:200px;
 }

 .chart-right{
 right:120px;
 width:160px;
 height:120px;
 }

 .features{
 width:100%;
 max-width:620px;
 bottom:48px;
 }

 .feature{
 min-height:76px;
 font-size:22px;
 }

 .author{
 bottom:150px;
 }
 }

 @media (max-width: 640px){
 body{
 padding:0;
 align-items:stretch;
 }

 .poster{
 width:100vw;
 min-height:100vh;
 min-height:100svh;
 min-height:100dvh;
 height:auto;
 aspect-ratio:auto;
 }

 .content{
 min-height:100vh;
 min-height:100svh;
 min-height:100dvh;
 padding:
 calc(72px + env(safe-area-inset-top))
 20px
 calc(28px + env(safe-area-inset-bottom))
 20px;
 }

 .title .top{ font-size:34px; }
 .title .mid,
 .title .bottom{ font-size:44px; }

 .subtitle{
 font-size:18px;
 margin-top:16px;
 }

 .top-right .size{
 font-size:13px;
 }

 .top-right{
 top:20px;
 right:20px;
 }

 .dots-tl{
 left:20px;
 top:24px;
 transform:scale(.72);
 }

 .dots-bl{
 left:20px;
 bottom:24px;
 transform:scale(.72);
 }

 .middle{
 height:330px;
 margin-top:20px;
 transform:scale(.72);
 transform-origin:top center;
 }

 .wave-wrap{
 width:125%;
 height:130px;
 top:57%;
 }

 .glass{
 display:block;
 }

 .num{
 display:block;
 }

 .mini-bottom{
 display:flex;
 }

 .ai-card{
 right:6px;
 bottom:12px;
 width:185px;
 height:138px;
 border-radius:18px;
 }

 .brain{
 width:72px;
 height:54px;
 top:14px;
 }

 .brain::before,
 .brain::after{
 width:20px;
 height:24px;
 top:12px;
 }

 .brain::before{ left:12px; }
 .brain::after{ right:12px; }

 .chip{
 width:90px;
 height:62px;
 bottom:16px;
 }

 .chip .ai{
 font-size:28px;
 }

 .author{
 position:static;
 transform:none;
 text-align:center;
 margin-top:0;
 margin-bottom:18px;
 font-size:16px;
 }

 .features{
 position:static;
 transform:none;
 width:100%;
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:12px;
 margin-top:-8px;
 }

 .feature{
 min-height:62px;
 font-size:17px;
 border-radius:16px;
 }
 }

 @media (max-width: 420px){
 .content{
 padding:
 calc(64px + env(safe-area-inset-top))
 14px
 calc(22px + env(safe-area-inset-bottom))
 14px;
 }

 .title .top{ font-size:28px; }
 .title .mid,
 .title .bottom{ font-size:35px; }

 .subtitle{
 font-size:15px;
 }

 .middle{
 height:280px;
 transform:scale(.60);
 }

 .features{
 gap:10px;
 }

 .feature{
 min-height:56px;
 font-size:15px;
 padding:8px;
 }

 .top-right{
 right:14px;
 top:14px;
 }

 .dots-tl{
 left:12px;
 top:16px;
 transform:scale(.62);
 }

 .dots-bl{
 left:12px;
 bottom:16px;
 transform:scale(.62);
 }

 .author{
 font-size:14px;
 }
 }
 </style>
</head>

 <span></span><span></span><span></span><span></span>
 <span></span><span></span><span></span><span></span>
 <span></span><span></span><span></span><span></span>
 <span></span><span></span><span></span><span></span>
 </div>

 <div class="grid-dots dots-bl">
 <span></span><span></span><span></span><span></span>
 <span></span><span></span><span></span><span></span>
 <span></span><span></span><span></span><span></span>
 <span></span><span></span><span></span><span></span>

 <div class="top-right">
 <div class="mini"><span></span><span></span><span></span></div>

 </div>

 <div class="content">

 <div class="subtitle">Turning complexity into clarity</div>

 <div class="middle">

 <div class="num pink" style="left:-10px; top:105px; font-size:28px;">3</div>
 <div class="num white" style="left:8px; top:165px; font-size:24px;">68</div>

 <div class="num pink" style="left:180px; top:190px; font-size:34px;">3122</div>
 <div class="num white" style="left:290px; top:162px; font-size:22px;">2</div>

 <div class="glass chart-line" style="left:22px; top:210px; width:160px; height:108px;">
 <svg viewBox="0 0 160 108" preserveAspectRatio="none">
 <rect x="0" y="0" width="160" height="108" fill="transparent"/>

 </div>

 <svg viewBox="0 0 170 100" preserveAspectRatio="none">
 <line x1="14" y1="84" x2="154" y2="84" stroke="rgba(255,255,255,.15)"/>
 <line x1="14" y1="84" x2="14" y2="14" stroke="rgba(255,255,255,.15)"/>
 <rect x="24" y="58" width="16" height="26" rx="4" fill="rgba(146,245,255,.85)"/>
 <rect x="50" y="45" width="16" height="39" rx="4" fill="rgba(200,145,255,.85)"/>

 </svg>
 </div>

 <div class="glass code-card" style="left:236px; top:250px; width:132px; height:92px;">
model.train(x, y)<br>
score = 0.95<br>
epoch += 1<br>
predict(data)<br>
loss ↓
 </div>

 <div class="glass mini-panel" style="right:328px; top:250px; width:118px; height:152px;">
 <div class="row"><span class="dot"></span><div class="bar"></div></div>
 <div class="row"><span class="dot" style="background:#cb98ff;"></span><div class="bar"></div></div>
 <div class="row"><span class="dot"></span><div class="bar"></div></div>
 <div class="bar" style="height:52px; margin-top:8px; border-radius:16px;"></div>

 <div class="glass chart-right chart-line">
 <svg viewBox="0 0 210 145" preserveAspectRatio="none">
 <line x1="18" y1="120" x2="194" y2="120" stroke="rgba(255,255,255,.2)"/>

 <polyline points="24,112 48,96 72,86 96,80 120,68 145,58 172,42"
 fill="none" stroke="rgba(192,142,255,.9)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
 </svg>
 </div>

 <div class="glass small-card" style="right:42px; top:116px;">
 <div class="small-bars">
 <span></span><span></span><span></span><span></span>
 </div>
 </div>

 <div class="glass small-card" style="right:34px; top:238px; width:100px; height:92px;">
 <div class="small-bars">
 <span style="height:24px"></span>
 <span style="height:36px"></span>
 <span style="height:54px"></span>
 <span style="height:44px"></span>
 </div>
 </div>

 <div class="glass small-card" style="right:208px; top:376px; width:110px; height:92px;">
 <div class="small-bars">
 <span style="height:22px"></span>
 <span style="height:38px"></span>
 <span style="height:58px"></span>
 <span style="height:48px"></span>
 </div>
 </div>

 <div class="ai-card">
 <div class="brain"></div>
 <div class="chip"><div class="ai">AI</div></div>
 </div>

 <div class="wave-wrap">
 <svg id="waveSvg" viewBox="0 0 960 220" preserveAspectRatio="none" width="100%" height="100%">
 <defs>
 <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
 <stop offset="0%" stop-color="#f09cff"/>
 <stop offset="34%" stop-color="#b393ff"/>
 <stop offset="66%" stop-color="#82eeff"/>
 <stop offset="100%" stop-color="#89ffd6"/>
 </linearGradient>
 <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
 <stop offset="0%" stop-color="#89ffd6"/>
 <stop offset="34%" stop-color="#82eeff"/>
 <stop offset="66%" stop-color="#f09cff"/>
 <stop offset="100%" stop-color="#b393ff"/>
 </linearGradient>
